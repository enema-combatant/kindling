<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindling — Mission 00: Ignition</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --border: #0f3460;
            --text: #e4e4e4;
            --text-dim: #8892a0;
            --accent: #e94560;
            --accent-dim: #533483;
            --user-bg: #0f3460;
            --ai-bg: #1a1a3e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
        }
        header span {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid var(--border);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--ai-bg);
            border: 1px solid var(--accent-dim);
        }
        .message.system {
            align-self: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            font-style: italic;
        }
        .message.thinking {
            color: var(--text-dim);
        }
        .message.thinking::after {
            content: ' ...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' '; }
            40% { content: ' .'; }
            60% { content: ' ..'; }
            80%, 100% { content: ' ...'; }
        }
        #input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
        }
        #input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }
        #input-area input:focus {
            border-color: var(--accent);
        }
        #input-area button {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }
        #input-area button:hover {
            opacity: 0.9;
        }
        #input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <h1>KINDLING</h1>
        <span>Mission 00: Ignition</span>
    </header>

    <div id="chat-container">
        <div class="message system">
            Your AI is ready. Type a message to begin.
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message..."
               autofocus autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;

            // Show thinking indicator via CSS class (no innerHTML)
            const aiMsg = appendMessage('assistant', 'Thinking');
            aiMsg.classList.add('thinking');

            try {
                const response = await fetch('/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                // Remove thinking state and start showing content
                aiMsg.classList.remove('thinking');
                aiMsg.textContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                fullText += JSON.parse(data);
                            } catch (e) {
                                fullText += data;
                            }
                            aiMsg.textContent = fullText;
                        }
                    }

                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (err) {
                aiMsg.classList.remove('thinking');
                aiMsg.textContent = 'Error: ' + err.message + '. Is the model running?';
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
