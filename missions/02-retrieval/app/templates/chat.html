<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindling — Mission 02: Retrieval</title>
    <style>
        :root {
            --bg: #1a1a2e; --surface: #16213e; --border: #0f3460;
            --text: #e4e4e4; --text-dim: #8892a0; --accent: #e94560;
            --accent-dim: #533483; --success: #4ecca3; --source-bg: #0d1b2a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 1rem;
        }
        header h1 { font-size: 1rem; font-weight: 600; color: var(--accent); }
        header span { font-size: 0.8rem; color: var(--text-dim); }
        .main-area { flex: 1; display: flex; overflow: hidden; }
        #chat-panel { flex: 2; display: flex; flex-direction: column; }
        #sources-panel {
            flex: 1; border-left: 1px solid var(--border);
            overflow-y: auto; padding: 1rem;
        }
        #sources-panel h3 {
            font-size: 0.8rem; color: var(--text-dim);
            margin-bottom: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .source-card {
            background: var(--source-bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem;
            font-size: 0.8rem;
        }
        .source-card .source-name {
            color: var(--accent); font-size: 0.75rem; margin-bottom: 0.4rem;
        }
        .source-card .source-sim {
            color: var(--success); font-size: 0.7rem; float: right;
        }
        .source-card .source-text {
            color: var(--text-dim); line-height: 1.4;
            max-height: 6rem; overflow-y: auto;
        }
        #chat-container {
            flex: 1; overflow-y: auto; padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .message {
            max-width: 90%; padding: 0.75rem 1rem; border-radius: 8px;
            line-height: 1.5; font-size: 0.9rem; white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end; background: #0f3460;
            border: 1px solid var(--border);
        }
        .message.assistant {
            align-self: flex-start; background: #1a1a3e;
            border: 1px solid var(--accent-dim);
        }
        .message.system {
            align-self: center; color: var(--text-dim);
            font-size: 0.8rem; font-style: italic;
        }
        .message.thinking { color: var(--text-dim); }
        .message.thinking::after {
            content: ' ...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' '; } 40% { content: ' .'; }
            60% { content: ' ..'; } 80%, 100% { content: ' ...'; }
        }
        #input-area {
            padding: 1rem 1.5rem; border-top: 1px solid var(--border);
            display: flex; gap: 0.75rem;
        }
        #input-area input {
            flex: 1; padding: 0.75rem 1rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-family: inherit; font-size: 0.9rem;
            outline: none;
        }
        #input-area input:focus { border-color: var(--accent); }
        #input-area button {
            padding: 0.75rem 1.5rem; background: var(--accent); border: none;
            border-radius: 6px; color: white; font-family: inherit;
            font-size: 0.9rem; cursor: pointer; font-weight: 600;
        }
        #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>KINDLING</h1>
        <span>Mission 02: Retrieval — RAG Pipeline</span>
    </header>

    <div class="main-area">
        <div id="chat-panel">
            <div id="chat-container">
                <div class="message system">
                    Ask a question about your documents. The AI will retrieve
                    relevant context before answering and cite its sources.
                </div>
            </div>
            <div id="input-area">
                <input type="text" id="query-input"
                       placeholder="Ask your documents a question..."
                       autofocus autocomplete="off">
                <button id="ask-btn" onclick="askQuestion()">Ask</button>
            </div>
        </div>

        <div id="sources-panel">
            <h3>Retrieved Sources</h3>
            <div id="sources-list">
                <div style="color: var(--text-dim); font-size: 0.8rem; font-style: italic;">
                    Sources will appear here when you ask a question.
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const queryInput = document.getElementById('query-input');
        const askBtn = document.getElementById('ask-btn');
        const sourcesList = document.getElementById('sources-list');

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !askBtn.disabled) askQuestion();
        });

        async function askQuestion() {
            const query = queryInput.value.trim();
            if (!query) return;

            appendMessage('user', query);
            queryInput.value = '';
            askBtn.disabled = true;

            const aiMsg = appendMessage('assistant', 'Retrieving context');
            aiMsg.classList.add('thinking');

            // Clear sources
            sourcesList.textContent = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                aiMsg.classList.remove('thinking');
                aiMsg.textContent = '';

                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line

                    for (const line of lines) {
                        if (line.startsWith('event: sources')) {
                            // Next data line contains the sources
                            continue;
                        }
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;

                            // Try to parse as sources JSON
                            try {
                                const sources = JSON.parse(data);
                                if (Array.isArray(sources) && sources.length > 0 && sources[0].source) {
                                    renderSources(sources);
                                    continue;
                                }
                            } catch (e) {
                                // Not JSON — it's a text token
                            }

                            fullText += data;
                            aiMsg.textContent = fullText;
                        }
                    }

                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (err) {
                aiMsg.classList.remove('thinking');
                aiMsg.textContent = 'Error: ' + err.message;
            }

            askBtn.disabled = false;
            queryInput.focus();
        }

        function renderSources(sources) {
            sourcesList.textContent = '';
            sources.forEach((s) => {
                const card = document.createElement('div');
                card.className = 'source-card';

                const name = document.createElement('div');
                name.className = 'source-name';
                name.textContent = s.source;

                const sim = document.createElement('span');
                sim.className = 'source-sim';
                sim.textContent = (s.similarity * 100).toFixed(1) + '%';
                name.appendChild(sim);

                const text = document.createElement('div');
                text.className = 'source-text';
                text.textContent = s.text;

                card.appendChild(name);
                card.appendChild(text);
                sourcesList.appendChild(card);
            });
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
