<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindling — Mission 05: Agents</title>
    <style>
        :root {
            --bg: #1a1a2e; --surface: #16213e; --border: #0f3460;
            --text: #e4e4e4; --text-dim: #8892a0; --accent: #e94560;
            --accent-dim: #533483; --success: #4ecca3; --source-bg: #0d1b2a;
            --tool-bg: #1a1a3e; --warn: #e9a945;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 1rem;
        }
        header h1 { font-size: 1rem; font-weight: 600; color: var(--accent); }
        header span { font-size: 0.8rem; color: var(--text-dim); }
        .main-area { flex: 1; display: flex; overflow: hidden; }

        /* Chat panel */
        #chat-panel { flex: 2; display: flex; flex-direction: column; }
        #chat-container {
            flex: 1; overflow-y: auto; padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .message {
            max-width: 90%; padding: 0.75rem 1rem; border-radius: 8px;
            line-height: 1.5; font-size: 0.9rem; white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end; background: #0f3460;
            border: 1px solid var(--border);
        }
        .message.assistant {
            align-self: flex-start; background: #1a1a3e;
            border: 1px solid var(--accent-dim);
        }
        .message.system {
            align-self: center; color: var(--text-dim);
            font-size: 0.8rem; font-style: italic;
        }
        .message.thinking { color: var(--text-dim); }
        .message.thinking::after {
            content: ' ...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ' '; } 40% { content: ' .'; }
            60% { content: ' ..'; } 80%, 100% { content: ' ...'; }
        }

        /* Input area */
        #input-area {
            padding: 1rem 1.5rem; border-top: 1px solid var(--border);
            display: flex; gap: 0.75rem;
        }
        #input-area input {
            flex: 1; padding: 0.75rem 1rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 6px;
            color: var(--text); font-family: inherit; font-size: 0.9rem;
            outline: none;
        }
        #input-area input:focus { border-color: var(--accent); }
        #input-area button {
            padding: 0.75rem 1.5rem; background: var(--accent); border: none;
            border-radius: 6px; color: white; font-family: inherit;
            font-size: 0.9rem; cursor: pointer; font-weight: 600;
        }
        #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Trace panel */
        #trace-panel {
            flex: 1; border-left: 1px solid var(--border);
            overflow-y: auto; padding: 1rem;
            min-width: 300px;
        }
        #trace-panel h3 {
            font-size: 0.8rem; color: var(--text-dim);
            margin-bottom: 0.75rem; text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .trace-meta {
            font-size: 0.75rem; color: var(--text-dim);
            margin-bottom: 1rem; padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .trace-step {
            background: var(--source-bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.75rem; margin-bottom: 0.75rem;
            font-size: 0.8rem;
        }
        .trace-step-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.4rem;
        }
        .trace-step-num {
            color: var(--accent); font-weight: 600; font-size: 0.7rem;
        }
        .trace-tool-name {
            color: var(--success); font-weight: 600;
        }
        .trace-args {
            color: var(--warn); font-size: 0.75rem;
            margin-bottom: 0.4rem; word-break: break-all;
        }
        .trace-result {
            color: var(--text-dim); line-height: 1.4;
            max-height: 6rem; overflow-y: auto;
            white-space: pre-wrap; word-break: break-word;
        }
        .trace-empty {
            color: var(--text-dim); font-size: 0.8rem; font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <h1>KINDLING</h1>
        <span>Mission 05: Agents — Control Loop</span>
    </header>

    <div class="main-area">
        <div id="chat-panel">
            <div id="chat-container">
                <div class="message system">
                    Ask a question. The agent will decide which tools to call,
                    execute them, and build an answer. Watch the reasoning trace
                    on the right to see every decision.
                </div>
            </div>
            <div id="input-area">
                <input type="text" id="query-input"
                       placeholder="Ask something that requires tools..."
                       autofocus autocomplete="off">
                <button id="ask-btn">Ask</button>
            </div>
        </div>

        <div id="trace-panel">
            <h3>Reasoning Trace</h3>
            <div id="trace-container">
                <div class="trace-empty">
                    Tool calls will appear here as the agent works.
                </div>
            </div>
        </div>
    </div>

    <script>
        var chatContainer = document.getElementById('chat-container');
        var queryInput = document.getElementById('query-input');
        var askBtn = document.getElementById('ask-btn');
        var traceContainer = document.getElementById('trace-container');

        queryInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !askBtn.disabled) askQuestion();
        });

        askBtn.addEventListener('click', function() {
            if (!askBtn.disabled) askQuestion();
        });

        function askQuestion() {
            var query = queryInput.value.trim();
            if (!query) return;

            appendMessage('user', query);
            queryInput.value = '';
            askBtn.disabled = true;

            var aiMsg = appendMessage('assistant', 'Agent is working');
            aiMsg.classList.add('thinking');

            // Clear trace
            clearElement(traceContainer);
            var metaDiv = document.createElement('div');
            metaDiv.className = 'trace-meta';
            metaDiv.textContent = 'Running...';
            traceContainer.appendChild(metaDiv);

            fetch('/agent', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query }),
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                aiMsg.classList.remove('thinking');

                if (data.error) {
                    aiMsg.textContent = 'Error: ' + data.error;
                    return;
                }

                aiMsg.textContent = data.answer;

                // Render trace
                clearElement(traceContainer);

                var meta = document.createElement('div');
                meta.className = 'trace-meta';
                meta.textContent = data.steps.length + ' tool call' +
                    (data.steps.length !== 1 ? 's' : '') +
                    ' in ' + data.iterations + ' iteration' +
                    (data.iterations !== 1 ? 's' : '');
                traceContainer.appendChild(meta);

                data.steps.forEach(function(step, i) {
                    var card = document.createElement('div');
                    card.className = 'trace-step';

                    var header = document.createElement('div');
                    header.className = 'trace-step-header';

                    var num = document.createElement('span');
                    num.className = 'trace-step-num';
                    num.textContent = 'STEP ' + (i + 1);

                    var toolName = document.createElement('span');
                    toolName.className = 'trace-tool-name';
                    toolName.textContent = step.tool;

                    header.appendChild(num);
                    header.appendChild(toolName);

                    var args = document.createElement('div');
                    args.className = 'trace-args';
                    args.textContent = JSON.stringify(step.args);

                    var result = document.createElement('div');
                    result.className = 'trace-result';
                    var resultText = step.result;
                    if (resultText.length > 300) {
                        resultText = resultText.substring(0, 300) + '...';
                    }
                    result.textContent = resultText;

                    card.appendChild(header);
                    card.appendChild(args);
                    card.appendChild(result);
                    traceContainer.appendChild(card);
                });

                chatContainer.scrollTop = chatContainer.scrollHeight;
            })
            .catch(function(err) {
                aiMsg.classList.remove('thinking');
                aiMsg.textContent = 'Error: ' + err.message;
            })
            .finally(function() {
                askBtn.disabled = false;
                queryInput.focus();
            });
        }

        function appendMessage(role, text) {
            var div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function clearElement(el) {
            while (el.firstChild) {
                el.removeChild(el.firstChild);
            }
        }
    </script>
</body>
</html>
